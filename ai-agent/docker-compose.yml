services:
  tool-gateway:
    build:
      context: .
      dockerfile: apps/tool-gateway/Dockerfile
    env_file: .env
    ports:
      - "4020:4020"
  agent-service:
    build:
      context: .
      dockerfile: apps/agent-service/Dockerfile
    env_file: .env
    ports:
      - "4010:4010"
    depends_on:
      - tool-gateway
